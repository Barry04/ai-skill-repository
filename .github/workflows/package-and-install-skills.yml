name: Package and Install Skills

on:
  push:
    branches: [master]
    paths:
      - "skill/**"
      - "install.ps1"
      - "install.sh"
      - ".github/workflows/package-and-install-skills.yml"
  pull_request:
    paths:
      - "skill/**"
      - "install.ps1"
      - "install.sh"
      - ".github/workflows/package-and-install-skills.yml"
  workflow_dispatch:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  package:
    name: Package platform bundles
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify skill layout
        shell: bash
        run: |
          set -euo pipefail
          count=0
          for dir in skill/*/; do
            name=$(basename "$dir")
            if [ ! -f "skill/${name}/SKILL.md" ]; then
              echo "Missing SKILL.md: skill/${name}/"
              exit 1
            fi
            echo "ok: ${name}"
            count=$((count + 1))
          done
          if [ "$count" -eq 0 ]; then
            echo "No skills found under skill/"
            exit 1
          fi
          echo "Verified ${count} skill(s)"

      - name: Verify docs mention every skill
        shell: bash
        run: |
          set -euo pipefail
          docs=(AGENTS.md README.md README.en.md UPGRADE.md)
          for dir in skill/*/; do
            name=$(basename "$dir")
            for doc in "${docs[@]}"; do
              if ! grep -Fq "$name" "$doc"; then
                echo "Missing skill mention: ${name} in ${doc}"
                exit 1
              fi
            done
          done
          echo "All docs mention every skill"

      - name: Validate install scripts
        shell: bash
        run: |
          set -euo pipefail
          bash -n install.sh
          pwsh -NoProfile -Command '$errors = $null; $tokens = $null; [System.Management.Automation.Language.Parser]::ParseFile((Resolve-Path "install.ps1"), [ref]$tokens, [ref]$errors) | Out-Null; if ($errors.Count -gt 0) { $errors | Format-List; exit 1 }'

      - name: Build Windows bundle
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist/windows
          cp -R skill dist/windows/
          cp install.ps1 dist/windows/
          (cd dist/windows && zip -r ../ai-skill-repository-skills-windows.zip .)
          unzip -l dist/ai-skill-repository-skills-windows.zip

      - name: Build Unix bundle
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist/unix
          cp -R skill dist/unix/
          cp install.sh dist/unix/
          chmod +x dist/unix/install.sh
          (cd dist/unix && zip -r ../ai-skill-repository-skills-unix.zip .)
          unzip -l dist/ai-skill-repository-skills-unix.zip

      - name: Upload Windows bundle
        uses: actions/upload-artifact@v4
        with:
          name: windows-bundle
          path: dist/ai-skill-repository-skills-windows.zip
          if-no-files-found: error

      - name: Upload Unix bundle
        uses: actions/upload-artifact@v4
        with:
          name: unix-bundle
          path: dist/ai-skill-repository-skills-unix.zip
          if-no-files-found: error

  install-windows:
    name: Install on Windows
    needs: package
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download Windows bundle
        uses: actions/download-artifact@v4
        with:
          name: windows-bundle
          path: dist

      - name: Extract bundle
        shell: pwsh
        run: Expand-Archive -Path dist/ai-skill-repository-skills-windows.zip -DestinationPath bundle -Force

      - name: Install skills
        shell: pwsh
        working-directory: bundle
        run: |
          Set-StrictMode -Version Latest
          $ErrorActionPreference = "Stop"
          Get-ChildItem
          & ".\install.ps1"

      - name: Verify installation
        shell: pwsh
        run: |
          Set-StrictMode -Version Latest
          $ErrorActionPreference = "Stop"
          $toolDirs = @(
            "$env:USERPROFILE\.cursor\skills",
            "$env:USERPROFILE\.claude\skills"
          )
          $skills = Get-ChildItem -Path skill -Directory
          foreach ($skill in $skills) {
            $name = $skill.Name
            foreach ($toolDir in $toolDirs) {
              $target = Join-Path $toolDir $name
              if (-not (Test-Path (Join-Path $target "SKILL.md"))) {
                throw "Missing installed skill: $target\SKILL.md"
              }
            }
            Write-Host "verified: $name"
          }

  install-macos:
    name: Install on macOS
    needs: package
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download Unix bundle
        uses: actions/download-artifact@v4
        with:
          name: unix-bundle
          path: dist

      - name: Extract bundle
        shell: bash
        run: |
          set -euo pipefail
          unzip -q dist/ai-skill-repository-skills-unix.zip -d bundle
          ls -la bundle/

      - name: Install skills
        shell: bash
        working-directory: bundle
        run: |
          set -euo pipefail
          bash ./install.sh

      - name: Verify installation
        shell: bash
        run: |
          set -euo pipefail
          TOOL_DIRS=("$HOME/.cursor/skills" "$HOME/.claude/skills")
          for dir in skill/*/; do
            name=$(basename "$dir")
            for tool in "${TOOL_DIRS[@]}"; do
              if [ ! -f "${tool}/${name}/SKILL.md" ]; then
                echo "Missing: ${tool}/${name}/SKILL.md"
                exit 1
              fi
            done
            echo "verified: ${name}"
          done

  install-linux:
    name: Install on Linux
    needs: package
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download Unix bundle
        uses: actions/download-artifact@v4
        with:
          name: unix-bundle
          path: dist

      - name: Extract bundle
        shell: bash
        run: |
          set -euo pipefail
          unzip -q dist/ai-skill-repository-skills-unix.zip -d bundle
          ls -la bundle/

      - name: Install skills
        shell: bash
        working-directory: bundle
        run: |
          set -euo pipefail
          bash ./install.sh

      - name: Verify installation
        shell: bash
        run: |
          set -euo pipefail
          TOOL_DIRS=("$HOME/.cursor/skills" "$HOME/.claude/skills")
          for dir in skill/*/; do
            name=$(basename "$dir")
            for tool in "${TOOL_DIRS[@]}"; do
              if [ ! -f "${tool}/${name}/SKILL.md" ]; then
                echo "Missing: ${tool}/${name}/SKILL.md"
                exit 1
              fi
            done
            echo "verified: ${name}"
          done

  publish-release:
    name: Publish Release Artifacts
    needs: [package, install-windows, install-macos, install-linux]
    runs-on: ubuntu-latest
    if: github.event_name == 'release' && github.event.action == 'published'
    permissions:
      contents: write
    steps:
      - name: Download Windows bundle
        uses: actions/download-artifact@v4
        with:
          name: windows-bundle
          path: dist-windows

      - name: Download Unix bundle
        uses: actions/download-artifact@v4
        with:
          name: unix-bundle
          path: dist-unix

      - name: Upload artifacts to Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            dist-windows/ai-skill-repository-skills-windows.zip
            dist-unix/ai-skill-repository-skills-unix.zip
